<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">🏨</span>
        <span class="logo-text">{{ title }}</span>
      </div>
      <div class="header-actions">
        <span class="current-date">{{ currentDate | date:'yyyy年MM月dd日 EEEE' }}</span>
      </div>
    </div>
  </header>
  
  <div class="main-content">
    <aside class="sidebar">
      <nav class="nav-menu">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">📊</span>
          <span class="nav-text">仪表盘</span>
        </a>
        <a routerLink="/room-types" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">🏷️</span>
          <span class="nav-text">房型管理</span>
        </a>
        <a routerLink="/rooms" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">🚪</span>
          <span class="nav-text">房间管理</span>
        </a>
        <a routerLink="/room-status" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">📅</span>
          <span class="nav-text">房态视图</span>
        </a>
        <a routerLink="/reservations" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">📝</span>
          <span class="nav-text">预订管理</span>
        </a>
        <a routerLink="/reservations/create" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">➕</span>
          <span class="nav-text">新建预订</span>
        </a>
        <a routerLink="/orders" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">💰</span>
          <span class="nav-text">订单管理</span>
        </a>
      </nav>
    </aside>
    
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
